services:
  # Users Service Database
  users-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./users-service/migrations:/docker-entrypoint-initdb.d:ro
      - users_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Books Service Database
  books-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: books
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./books-service/migrations:/docker-entrypoint-initdb.d:ro
      - books_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Frontend Application
  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      users-postgres:
        condition: service_healthy
      books-postgres:
        condition: service_healthy

volumes:
  users_postgres_data:
  books_postgres_data:
